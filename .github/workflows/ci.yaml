# TODO(bootstrap): This file is CI workflow for the example Python application.
#                  Update it according to your project's requirements.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: latest
          enable-cache: true

      - name: Install deps
        run: uv sync

      - name: Check formatting
        run: uv run ruff format --check

      - name: Lint code
        run: uv run ruff check

      - name: Type check
        run: uv run ty check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # Required for Codecov OIDC authentication
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: latest
          enable-cache: true

      - name: Install deps
        run: uv sync

      - name: Run tests
        run: uv run pytest --cov-report=xml --junitxml=junit.xml

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          fail_ci_if_error: false
          report_type: test_results
          files: junit.xml

      # TODO(bootstrap): Delete this step if user don't want to use Codecov
      - name: Upload code coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          fail_ci_if_error: false
          files: coverage.xml
